<!DOCTYPE html>

<head>
  <title>Interjector</title>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <link rel="stylesheet" type="text/css" href="./static/styles.css">
</head>

<body>
  <div id="console">
    <button id="start-btn">Start</button>
    <button id="clear-btn">Clear</button>
    <button id="complete-btn">Complete</button>
    🎙️: <div id="running-indicator"></div>
    🔊: <div id="audio-indicator"></div>
    🎶: <div id="sound-indicator"></div>
    💬: <div id="speech-indicator"></div>
    <div id="status"></div>
  </div>
  <div id="audio-sources">
    <strong>Audio sources</strong>
    <button type="button" id="refresh-devices">Refresh microphones</button>
    <span id="mic-list">Click "Refresh microphones" to choose inputs.</span>
    <label id="system-audio-label">
      <input type="checkbox" id="system-audio"> Computer / tab output
    </label>
    <span id="config-summary"></span>
  </div>
  <div id="container">
    <div id="transcript">
      <div id="transcript-final"></div>
      <div id="transcript-ongoing"></div>
    </div>
    <div id="transcript-translated">
      <div id="transcript-translated-final"></div>
      <div id="transcript-translated-ongoing"></div>
    </div>
    <div id="completions"></div>
  </div>
  <script src="./static/main.bundle.js"></script>
</body>

</html>
